name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --extra dev
      - run: uv run ruff check backend
      - run: uv run pytest
      # Bandit: static security linter for Python. Catches subprocess(shell=True),
      # hardcoded passwords, weak crypto, etc. We exclude tests because they
      # intentionally contain attack-shaped strings ("injection" payloads).
      - run: uv run --with bandit bandit -q -r backend/app -ll
      # pip-audit: scans third-party deps against PyPA advisory DB. We pipe
      # the uv lockfile in via `uv export` so meetingmind itself (an editable
      # install) doesn't break the audit. --strict elevates warnings to errors.
      - run: uv export --frozen --no-emit-project | uv run --with pip-audit pip-audit -r /dev/stdin --strict --disable-pip --no-deps
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # PII guard: block real-meeting and owner-identifying terms in
      # file content. Owner first/last names are OK as git committer
      # identities but not in source/tests/docs. See scripts/check_pii.py.
      - run: python3 scripts/check_pii.py --all

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      # npm audit: surface known-vulnerable transitive deps. `--audit-level=high`
      # keeps the bar at "actually shipped advisories" so dev-only low-sev noise
      # doesn't block PRs.
      - run: npm audit --omit=dev --audit-level=high
        working-directory: frontend
