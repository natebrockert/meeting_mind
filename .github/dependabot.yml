version: 2
updates:
  # Python deps managed by uv.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 5

  # Frontend deps.
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    groups:
      js-minor-patch:
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 5

  # GitHub Actions themselves.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
